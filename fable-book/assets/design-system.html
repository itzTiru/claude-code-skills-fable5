<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="fonts/fonts.css">
<style>
/* ============================================================
   FABLE EDITION — design tokens
   Warm ivory paper, slate ink, book-cloth coral.
   Serif: Source Serif 4 · Sans: Archivo · Mono: JetBrains Mono
   ============================================================ */
:root{
  --paper:   #FAF9F5;
  --paper-2: #F4F1E9;
  --paper-3: #EFEBE0;
  --ink:     #141413;
  --ink-2:   #55534B;
  --ink-3:   #8C887C;
  --hairline:#E3DED1;
  --coral:   #D97757;
  --crail:   #BF5A3B;
  --kraft:   #D4A27F;
  --manilla: #EBDBBC;
  --manilla-soft: #F3EAD5;
  --teal:    #0B9678;
  --sage:    #7D8E76;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
@page{size:7in 10.073in;margin:0.62in 0.72in 0.78in 0.72in}

html{font-size:10.5pt;background:var(--paper)}
body{
  font-family:"Source Serif 4",Georgia,serif;
  font-size:10.5pt;line-height:1.58;color:var(--ink);
  background:var(--paper);
  font-kerning:normal;
  text-rendering:optimizeLegibility;
}
p{margin:0 0 7.5pt 0;orphans:3;widows:3}
a{color:var(--crail);text-decoration:none}
strong{font-weight:600}
em{font-style:italic}
sup.ref{font-family:Archivo,sans-serif;font-size:6.6pt;color:var(--crail);letter-spacing:.02em}

/* ---------- invisible page-map markers ---------- */
.pgmark{position:absolute;top:1pt;left:0;font-size:2.5pt;color:var(--paper);letter-spacing:0;line-height:1;white-space:nowrap}

/* ---------- page structure ---------- */
.page{break-before:page;position:relative}
.avoid{break-inside:avoid}

/* ---------- eyebrows & headings ---------- */
.eyebrow{
  font-family:Archivo,sans-serif;font-size:7.6pt;font-weight:600;
  letter-spacing:.17em;text-transform:uppercase;color:var(--crail);
  margin:0 0 10pt 0;
}
.eyebrow .sep{color:var(--kraft);margin:0 4pt}
.eyebrow.quiet{color:var(--ink-3)}
h2.ch{
  font-size:20.5pt;font-weight:600;line-height:1.16;letter-spacing:-0.012em;
  margin:2pt 0 5pt 0;break-after:avoid;
}
.ch-rule{
  height:2.6pt;width:30pt;background:var(--coral);border-radius:2pt;
  margin:9pt 0 15pt 0;
}
h3{
  font-size:12.6pt;font-weight:600;line-height:1.25;letter-spacing:-0.006em;
  margin:15pt 0 6pt 0;break-after:avoid;
}
h4{
  font-family:Archivo,sans-serif;font-size:8.2pt;font-weight:600;
  letter-spacing:.13em;text-transform:uppercase;color:var(--ink-2);
  margin:13pt 0 5.5pt 0;break-after:avoid;
}

/* ---------- callout note ---------- */
.note{
  background:var(--paper-2);border:0.8pt solid var(--hairline);
  border-radius:9pt;padding:10.5pt 13pt 9.5pt 13pt;margin:11pt 0;break-inside:avoid;
}
.note .nt{
  font-family:Archivo,sans-serif;font-size:7.4pt;font-weight:600;
  letter-spacing:.15em;text-transform:uppercase;color:var(--crail);
  margin:0 0 5pt 0;display:flex;align-items:center;gap:5.5pt;
}
.note .nt svg{flex:0 0 auto}
.note p{font-size:9.6pt;line-height:1.55;margin:0 0 5pt 0}
.note p:last-child{margin-bottom:0}
.note.key{background:var(--manilla-soft);border-color:#E7DBBE}

/* ---------- formulas ---------- */
.formula{
  font-family:"JetBrainsMono Nerd Font","JetBrains Mono",monospace;
  font-size:8.6pt;line-height:1.75;text-align:center;color:var(--ink);
  background:var(--paper-2);border:1pt solid var(--hairline);border-radius:6pt;
  padding:8.5pt 10pt;margin:10pt 0;break-inside:avoid;white-space:pre;overflow-x:auto;
}
.formula b{color:var(--crail);font-weight:600}

/* ---------- code blocks ---------- */
.codewrap{margin:11pt 0;break-inside:avoid}
.codehead{
  font-family:Archivo,sans-serif;font-size:7.2pt;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink-2);
  background:var(--paper-3);border:1pt solid var(--hairline);border-bottom:none;
  border-radius:6pt 6pt 0 0;padding:5pt 11pt;display:flex;align-items:center;gap:5pt;
}
.codehead .dot{width:5pt;height:5pt;border-radius:50%;background:var(--coral);display:inline-block}
pre.code{
  font-family:"JetBrainsMono Nerd Font","JetBrains Mono",monospace;
  font-size:8.1pt;line-height:1.62;color:var(--ink);
  background:var(--paper-2);border:1pt solid var(--hairline);border-radius:0 0 6pt 6pt;
  padding:9pt 12pt;overflow-x:auto;white-space:pre;
}
pre.code .c{color:var(--ink-3);font-style:italic}
pre.code .k{color:var(--crail);font-weight:500}
pre.code .s{color:var(--teal)}

/* ---------- tables ---------- */
table.tbl{
  width:100%;border-collapse:collapse;margin:10pt 0 12pt 0;
  font-size:9.2pt;line-height:1.42;
}
table.tbl th{
  font-family:Archivo,sans-serif;font-size:7.3pt;font-weight:600;
  letter-spacing:.09em;text-transform:uppercase;color:var(--ink-2);
  text-align:left;padding:0 8pt 4.5pt 0;border-bottom:1.3pt solid var(--ink);
  vertical-align:bottom;
}
table.tbl td{
  padding:5pt 8pt 5pt 0;border-bottom:0.7pt solid var(--hairline);
  vertical-align:top;
}
table.tbl tr:last-child td{border-bottom:1pt solid var(--hairline)}
table.tbl td.lead{font-weight:600}
table.tbl td .m, table.tbl th .m,
.m{font-family:"JetBrainsMono Nerd Font","JetBrains Mono",monospace;font-size:88%}
table.tbl.dense{font-size:8.7pt}
table.tbl td.num{text-align:right;font-variant-numeric:tabular-nums}
table.tbl th.num{text-align:right}

/* ---------- lists ---------- */
ul.b{margin:5pt 0 9pt 0;padding-left:14pt;list-style:none}
ul.b li{margin:0 0 4.5pt 0;position:relative}
ul.b li::before{
  content:"";position:absolute;left:-13pt;top:5.8pt;width:5pt;height:2.2pt;
  background:var(--coral);border-radius:1.5pt;
}
ol.steps{margin:6pt 0 9pt 0;padding-left:0;list-style:none;counter-reset:step}
ol.steps li{
  counter-increment:step;position:relative;padding-left:24pt;margin:0 0 6pt 0;
}
ol.steps li::before{
  content:counter(step);position:absolute;left:0;top:0.4pt;
  width:15pt;height:15pt;border-radius:50%;
  background:var(--manilla-soft);border:1pt solid var(--kraft);
  color:var(--crail);font-family:Archivo,sans-serif;font-size:8pt;font-weight:600;
  display:flex;align-items:center;justify-content:center;line-height:1;
}

/* ---------- figures ---------- */
.fig{margin:12pt 0;break-inside:avoid;text-align:center}
.fig .figtitle{
  font-family:Archivo,sans-serif;font-size:7.4pt;font-weight:600;letter-spacing:.15em;
  text-transform:uppercase;color:var(--ink-2);margin-bottom:7pt;text-align:left;
  display:flex;align-items:center;gap:5pt;
}
.fig .figtitle::after{content:"";flex:1;height:0.7pt;background:var(--hairline)}
.fig svg{max-width:100%;height:auto}
.figcap{
  font-size:8.6pt;font-style:italic;color:var(--ink-3);line-height:1.5;
  margin-top:6pt;text-align:center;padding:0 18pt;
}

/* ---------- part opener ---------- */
.part{
  break-before:page;
  position:relative;
  height:8.67in; /* full inner page height */
  display:flex;flex-direction:column;justify-content:flex-start;
}
.part .pnum{
  font-family:Archivo,sans-serif;font-size:8pt;font-weight:600;letter-spacing:.22em;
  text-transform:uppercase;color:var(--crail);
  display:flex;align-items:center;gap:8pt;margin-top:34pt;
}
.part .pnum::after{content:"";flex:1;height:0.8pt;background:var(--hairline)}
.part h1{
  font-size:33pt;font-weight:600;line-height:1.08;letter-spacing:-0.018em;
  margin:16pt 0 12pt 0;max-width:4.6in;
}
.part .pdesc{
  font-size:12pt;line-height:1.55;font-style:italic;color:var(--ink-2);
  max-width:4.3in;margin-bottom:26pt;
}
.part .plist{border-top:1.3pt solid var(--ink);max-width:4.7in}
.part .plist a{
  display:flex;gap:10pt;align-items:baseline;
  padding:6.5pt 0;border-bottom:0.7pt solid var(--hairline);
  color:var(--ink);font-size:10pt;
}
.part .plist .n{
  font-family:Archivo,sans-serif;font-size:7.8pt;font-weight:600;color:var(--crail);
  min-width:16pt;letter-spacing:.05em;
}
.part .motif{position:absolute;bottom:0.05in;left:0;right:0}

/* ---------- table of contents ---------- */
.toc h2.ch{margin-bottom:2pt}
.toc-part{
  font-family:Archivo,sans-serif;font-size:8pt;font-weight:600;letter-spacing:.16em;
  text-transform:uppercase;color:var(--crail);
  margin:14pt 0 3pt 0;display:flex;align-items:baseline;gap:8pt;break-after:avoid;
}
.toc-part .tp-pg{margin-left:auto;font-size:8pt;color:var(--ink-3);letter-spacing:.05em}
.toc-line{
  display:flex;align-items:baseline;gap:7pt;
  font-size:9.8pt;padding:2.6pt 0;color:var(--ink);
}
.toc-line .n{
  font-family:Archivo,sans-serif;font-size:7.6pt;font-weight:600;color:var(--crail);
  min-width:17pt;letter-spacing:.03em;
}
.toc-line .t{flex-shrink:0;max-width:4.1in}
.toc-line .dots{flex:1;border-bottom:1pt dotted var(--kraft);transform:translateY(-2.5pt);min-width:12pt}
.toc-line .pg{
  font-family:Archivo,sans-serif;font-size:8.2pt;color:var(--ink-2);
  font-variant-numeric:tabular-nums;min-width:14pt;text-align:right;
}
.toc-sub{padding-left:24pt}
.toc-sub .toc-line{font-size:9pt;color:var(--ink-2);padding:1.6pt 0}

/* ---------- cover ---------- */
.cover{
  position:relative;height:8.67in;
  padding:0.16in 0.1in 0 0.1in;
  display:flex;flex-direction:column;overflow:hidden;
}
.cover-eyebrow{
  font-family:Archivo,sans-serif;font-size:8.6pt;font-weight:600;letter-spacing:.24em;
  text-transform:uppercase;color:var(--crail);margin-top:0.3in;
  display:flex;align-items:center;gap:9pt;
}
.cover h1{
  font-size:55pt;font-weight:600;line-height:1.0;letter-spacing:-0.022em;
  margin:0.28in 0 0.12in 0;
}
.cover .sub{
  font-size:19pt;line-height:1.3;font-weight:400;color:var(--ink);
  letter-spacing:-0.008em;max-width:4.6in;
}
.cover .desc{
  font-size:10.3pt;line-height:1.6;color:var(--ink-2);font-style:italic;
  max-width:4.5in;margin-top:0.22in;
}
.cover .coverart{margin-top:auto;margin-bottom:0.34in}
.cover .foot{
  border-top:1.2pt solid var(--ink);padding-top:0.14in;
  display:flex;align-items:baseline;justify-content:space-between;
}
.cover .foot .who{font-size:10.5pt;font-weight:600}
.cover .foot .who span{font-weight:400;color:var(--ink-2)}
.cover .foot .ed{
  font-family:Archivo,sans-serif;font-size:7.6pt;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink-3);text-align:right;line-height:1.7;
}

/* ---------- interview Q&A ---------- */
dl.qa{margin:8pt 0}
dl.qa dt{font-weight:600;margin:9pt 0 2pt 0;break-after:avoid}
dl.qa dt::before{content:"Q · ";color:var(--crail);font-family:Archivo,sans-serif;font-size:8pt;font-weight:600;letter-spacing:.06em}
dl.qa dd{margin:0 0 0 15pt;color:var(--ink-2);font-size:9.8pt}

/* ---------- references ---------- */
.refs{font-size:9.2pt;line-height:1.5}
.refs .ref-item{margin:0 0 7.5pt 0;padding-left:26pt;position:relative;break-inside:avoid}
.refs .ref-item .rn{
  position:absolute;left:0;top:0.6pt;font-family:Archivo,sans-serif;
  font-size:7.6pt;font-weight:600;color:var(--crail);
}
.refs .ref-item .rt{font-weight:600}
.refs .ref-item .ra{color:var(--ink-2)}
.refs .ref-item .ru{font-family:"JetBrainsMono Nerd Font","JetBrains Mono",monospace;font-size:7.4pt;color:var(--crail);word-break:break-all}

/* ---------- misc ---------- */
.kicker{font-size:11.8pt;line-height:1.55;color:var(--ink-2);margin:0 0 10pt 0}
.smallcaps-note{font-size:8.8pt;color:var(--ink-3);font-style:italic}
.chart-legend{
  display:flex;gap:16pt;justify-content:center;align-items:center;
  font-family:Archivo,sans-serif;font-size:7.8pt;color:var(--ink-2);margin-top:2pt;
}
.chart-legend .sw{display:inline-block;width:8pt;height:8pt;border-radius:2pt;margin-right:4pt;vertical-align:-1pt}
</style>
</head>
